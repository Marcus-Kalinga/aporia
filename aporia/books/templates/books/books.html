<!-- Add this CSS in your style section -->
<style>
    /* ===== ADD BOOK FORM ===== */
    .add-book-form {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        margin-bottom: 40px;
        transition: all 0.3s ease;
    }
    
    .add-book-form h2 {
        color: #2c3e50;
        font-size: 1.5rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .form-group {
        margin-bottom: 18px;
    }
    
    .form-group label {
        display: block;
        font-weight: 600;
        color: #34495e;
        margin-bottom: 5px;
        font-size: 0.95rem;
    }
    
    .form-group label .required {
        color: #e74c3c;
        font-weight: bold;
    }
    
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.3s ease;
        background: #fafafa;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        background: white;
    }
    
    .form-group textarea {
        resize: vertical;
        min-height: 80px;
        max-height: 200px;
    }
    
    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 10px;
    }
    
    .btn-submit {
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        color: white;
        padding: 12px 35px;
        border: none;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        flex: 1;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(46, 204, 113, 0.4);
        background: linear-gradient(135deg, #27ae60, #219a52);
    }
    
    .btn-cancel {
        background: #ecf0f1;
        color: #7f8c8d;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-cancel:hover {
        background: #d5dbdb;
        color: #2c3e50;
    }
    
    /* ===== MESSAGES ===== */
    .messages {
        margin-bottom: 20px;
    }
    
    .message {
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 500;
        margin-bottom: 10px;
        animation: slideDown 0.3s ease;
    }
    
    .message.success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }
    
    .message.error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
    }
    
    .message.warning {
        background: #fff3cd;
        color: #856404;
        border-left: 4px solid #ffc107;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<!-- Add this right after the header and before the books grid -->
<div class="add-book-form">
    <h2>✏️ Share a Book You've Read</h2>
    
    <!-- Display messages (success/error/warning) -->
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <!-- Book submission form -->
    <form method="POST" action="{% url 'books:book_view' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">
                Book Title <span class="required">*</span>
            </label>
            <input 
                type="text" 
                id="title" 
                name="title" 
                placeholder="Enter the book title..." 
                value="{{ form_data.title|default:'' }}"
                required
                maxlength="200"
            >
        </div>
        
        <div class="form-group">
            <label for="author">
                Author <span class="required">*</span>
            </label>
            <input 
                type="text" 
                id="author" 
                name="author" 
                placeholder="Enter the author's name..." 
                value="{{ form_data.author|default:'' }}"
                required
                maxlength="200"
            >
        </div>
        
        <div class="form-group">
            <label for="review">
                Your Review <span style="color: #95a5a6; font-weight: normal;">(optional)</span>
            </label>
            <textarea 
                id="review" 
                name="review" 
                placeholder="What did you think about this book? (max 500 characters)..."
                maxlength="500"
            >{{ form_data.review|default:'' }}</textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">📤 Post Review</button>
            <button type="reset" class="btn-cancel">🗑️ Clear</button>
        </div>
    </form>
</div>
