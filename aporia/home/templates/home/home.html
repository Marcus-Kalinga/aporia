<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Aporia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 4rem;
        }

        .welcome-heading {
            font-size: 5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3),
                         0 0 40px rgba(255, 255, 255, 0.2);
            letter-spacing: 3px;
            animation: fadeIn 1.2s ease-out;
        }

        .welcome-heading .subtitle {
            display: block;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 0.5rem;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="welcome-heading">
            Welcome to Aporia
            <span class="subtitle">Question Everything</span>
        </h1>
    </div>
</body>
</html>
